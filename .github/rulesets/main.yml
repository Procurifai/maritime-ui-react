# Per-repo ruleset override for maritime-ui-react.
#
# Inherits the org-wide baseline (Verify ruleset matches main.yml + PR rule
# + bypass actors + deletion/non_fast_forward) from baseline.yml. Adds the
# primary CI gate "validate" reported by .github/workflows/ci.yml.
#
# The context name is just `validate` (the job name) — NOT `CI / validate`
# (which is how GitHub renders the check in the UI). Status-check contexts
# match the job name only.
#
# See guides/guide-027-governance-as-code.md.

extends: org-baseline

rules:
  - type: required_status_checks
    parameters:
      strict_required_status_checks_policy: false
      do_not_enforce_on_create: false
      required_status_checks:
        - context: 'validate'
